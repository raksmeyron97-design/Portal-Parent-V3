<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ព័ត៌មានគ្រួសារ - Parent Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@300;400;600;700&family=Moul&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { 
            font-family: 'Kantumruy Pro', sans-serif; 
            background-color: #1c1c1e; 
            color: #ffffff;
            margin: 0; 
            padding: 0; 
            overflow-x: hidden; 
            transition: background-color 0.3s ease, color 0.3s ease;
            -webkit-tap-highlight-color: transparent;
        }
        .kh-moul { font-family: 'Moul', cursive; }
        
        .pb-safe { padding-bottom: max(env(safe-area-inset-bottom), 1rem); }
        .pt-safe { padding-top: max(env(safe-area-inset-top), 1rem); }
        
        .bg-app-dark { background-color: #1c1c1e; transition: background-color 0.3s ease; }
        .bg-card-dark { background-color: #2c2c2e; transition: background-color 0.3s ease, border-color 0.3s ease; }
        .bg-header-green { background: linear-gradient(135deg, #1b5e20 0%, #2e7d32 100%); }
        
        /* Light Mode Adjustments */
        body.light-mode { background-color: #f9fafb; color: #1f2937; }
        body.light-mode .bg-app-dark { background-color: #f9fafb; }
        body.light-mode .bg-card-dark { background-color: #ffffff; border-color: #e5e7eb; box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05); }
        body.light-mode .text-gray-400 { color: #6b7280; }
        body.light-mode .text-gray-300 { color: #4b5563; }
        body.light-mode .text-gray-200 { color: #1f2937; }
        body.light-mode .border-gray-800 { border-color: #e5e7eb; }
        body.light-mode .bg-gray-800\/50 { background-color: #f3f4f6; }
        
        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 3px solid #10b981;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
        }
        body.light-mode .spinner { border-color: rgba(0, 0, 0, 0.1); border-top-color: #10b981; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-app-dark min-h-screen flex flex-col">

    <!-- Header -->
    <div class="bg-header-green pt-safe pb-4 px-4 shadow-md sticky top-0 z-50 flex items-center gap-3">
        <button onclick="window.location.href='index.html'" class="p-2 bg-white/10 rounded-full hover:bg-white/20 transition text-white">
            <i data-lucide="arrow-left" class="w-5 h-5"></i>
        </button>
        <h1 class="text-white font-bold text-lg kh-moul flex-1">ព័ត៌មានគ្រួសារ</h1>
    </div>

    <!-- Loading State -->
    <div id="loading-state" class="flex-1 flex flex-col items-center justify-center py-20">
        <div class="spinner mb-4"></div>
        <p class="text-gray-400 text-sm animate-pulse">កំពុងទាញយកទិន្នន័យ...</p>
    </div>

    <!-- Content -->
    <div id="main-content" class="hidden flex-1 p-4 pb-safe space-y-4 mt-2">

        <!-- Father Card -->
        <div class="bg-card-dark rounded-2xl p-5 border border-gray-800 shadow-sm relative overflow-hidden">
            <div class="absolute top-0 right-0 w-24 h-24 bg-blue-500/5 rounded-bl-[100px] -z-0"></div>
            
            <div class="flex items-center gap-4 mb-5 relative z-10">
                <div class="w-12 h-12 bg-blue-500/10 text-blue-500 rounded-2xl flex items-center justify-center border border-blue-500/20">
                    <i data-lucide="user" class="w-6 h-6"></i>
                </div>
                <div>
                    <h3 class="text-sm font-bold text-gray-400 mb-0.5">ព័ត៌មានឪពុក</h3>
                    <p id="f-name" class="font-bold text-lg text-gray-200 kh-moul">-</p>
                </div>
            </div>
            
            <div class="space-y-3 relative z-10 bg-gray-800/50 p-4 rounded-xl border border-gray-800/50">
                <div class="flex items-start gap-3">
                    <i data-lucide="briefcase" class="w-4 h-4 text-gray-400 mt-0.5"></i>
                    <div>
                        <p class="text-[11px] text-gray-400 font-bold mb-0.5">មុខរបរ</p>
                        <p id="f-job" class="text-sm text-gray-200">-</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Mother Card -->
        <div class="bg-card-dark rounded-2xl p-5 border border-gray-800 shadow-sm relative overflow-hidden">
            <div class="absolute top-0 right-0 w-24 h-24 bg-pink-500/5 rounded-bl-[100px] -z-0"></div>
            
            <div class="flex items-center gap-4 mb-5 relative z-10">
                <div class="w-12 h-12 bg-pink-500/10 text-pink-500 rounded-2xl flex items-center justify-center border border-pink-500/20">
                    <i data-lucide="user" class="w-6 h-6"></i>
                </div>
                <div>
                    <h3 class="text-sm font-bold text-gray-400 mb-0.5">ព័ត៌មានម្តាយ</h3>
                    <p id="m-name" class="font-bold text-lg text-gray-200 kh-moul">-</p>
                </div>
            </div>
            
            <div class="space-y-3 relative z-10 bg-gray-800/50 p-4 rounded-xl border border-gray-800/50">
                <div class="flex items-start gap-3">
                    <i data-lucide="briefcase" class="w-4 h-4 text-gray-400 mt-0.5"></i>
                    <div>
                        <p class="text-[11px] text-gray-400 font-bold mb-0.5">មុខរបរ</p>
                        <p id="m-job" class="text-sm text-gray-200">-</p>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="mt-6 text-center px-4">
            <p class="text-xs text-gray-500 leading-relaxed">ប្រសិនបើមានការផ្លាស់ប្តូរព័ត៌មានគ្រួសារ ឬអាសយដ្ឋាន សូមទំនាក់ទំនងទៅកាន់លោកគ្រូ អ្នកគ្រូប្រចាំថ្នាក់ ដើម្បីធ្វើការកែសម្រួល។</p>
        </div>

    </div>

    <!-- Firebase -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBU50HJrekgHWwwyLq5CTRwhjHkGJAAAfs",
            authDomain: "classroom-management-82382.firebaseapp.com",
            projectId: "classroom-management-82382",
            storageBucket: "classroom-management-82382.firebasestorage.app",
            messagingSenderId: "146641865620",
            appId: "1:146641865620:web:ce693b7b064afd5d1bdd81"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const PTEC_APP_ID = "ptec-app";

        // Check Theme
        if (localStorage.getItem('theme') === 'light') {
            document.body.classList.add('light-mode');
        }

        lucide.createIcons();

        const tid = localStorage.getItem('savedTid');
        const sid = localStorage.getItem('savedSid');

        if (!tid || !sid) {
            window.location.href = 'index.html';
        }

        const initAuth = async () => {
            if (!auth.currentUser) await signInAnonymously(auth);
        };

        initAuth().then(() => {
            onAuthStateChanged(auth, async (user) => {
                if (user) {
                    fetchFamilyData();
                }
            });
        });

        async function fetchFamilyData() {
            try {
                const docRef = doc(db, 'artifacts', PTEC_APP_ID, 'users', tid, 'students', sid);
                const snap = await getDoc(docRef);
                
                if (snap.exists()) {
                    const s = snap.data();
                    
                    document.getElementById('f-name').textContent = s.father || 'មិនមានទិន្នន័យ';
                    document.getElementById('f-job').textContent = s.fatherJob || 'មិនមានទិន្នន័យ';
                    
                    document.getElementById('m-name').textContent = s.mother || 'មិនមានទិន្នន័យ';
                    document.getElementById('m-job').textContent = s.motherJob || 'មិនមានទិន្នន័យ';

                    document.getElementById('loading-state').classList.add('hidden');
                    document.getElementById('main-content').classList.remove('hidden');
                } else {
                    alert('រកមិនឃើញទិន្នន័យទេ!');
                    window.location.href = 'index.html';
                }
            } catch (e) {
                console.error(e);
                alert('មានបញ្ហាក្នុងការទាញយកទិន្នន័យ។');
            }
        }
    </script>
</body>
</html>
