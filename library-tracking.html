<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
    <title>សៀវភៅតាមដាន - Parent Portal</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@300;400;600;700&family=Moul&family=Battambang:wght@400;700&display=swap" rel="stylesheet">
    <!-- បន្ថែម defer ទៅកាន់ External scripts -->
    <script src="https://unpkg.com/lucide@latest" defer></script>
    <script src="https://cdn.jsdelivr.net/gh/ThyrithSor/momentkh@3.0.3/momentkh.js" defer></script>
    <style>
        body { 
            font-family: 'Kantumruy Pro', sans-serif; 
            background-color: #121212; 
            color: #ffffff;
            margin: 0; 
            padding: 0; 
            transition: background-color 0.3s ease, color 0.3s ease;
            -webkit-tap-highlight-color: transparent; 
        }
        .kh-moul { font-family: 'Moul', cursive; }
        .font-battambang { font-family: 'Battambang', sans-serif; }
        
        /* Mobile Safe Areas */
        .pb-safe { padding-bottom: max(env(safe-area-inset-bottom), 1rem); }
        .pt-safe { padding-top: max(env(safe-area-inset-top), 1rem); }
        
        /* Custom Colors */
        .bg-app-dark { background-color: #1c1c1e; transition: background-color 0.3s ease; }
        .bg-card-dark { background-color: #2c2c2e; transition: background-color 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease; }
        .bg-header-green { background: linear-gradient(135deg, #1b5e20 0%, #2e7d32 100%); }
        
        /* Light Mode Adjustments */
        body.light-mode { background-color: #f9fafb; color: #1f2937; }
        body.light-mode .bg-app-dark { background-color: #f9fafb; }
        body.light-mode .bg-card-dark { background-color: #ffffff; border-color: #e5e7eb; box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05); }
        body.light-mode .text-gray-400 { color: #6b7280; }
        body.light-mode .text-gray-300 { color: #4b5563; }
        body.light-mode .text-gray-200 { color: #374151; }
        body.light-mode .border-gray-800 { border-color: #e5e7eb; }
        
        /* Hide scrollbar */
        ::-webkit-scrollbar { display: none; }
        
        /* Loader Loader */
        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 3px solid #10b981; 
            width: 24px;
            height: 24px;
            -webkit-animation: spin 1s linear infinite; 
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        select {
            appearance: none;
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%236b7280' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
            background-position: right 0.5rem center;
            background-repeat: no-repeat;
            background-size: 1.5em 1.5em;
        }
        body.light-mode select {
            background-color: #f9fafb;
            color: #1f2937;
            border-color: #d1d5db;
        }

        /* ------------------------- */
        /* Table Styles for Report Card */
        /* ------------------------- */
        .print-container {
            background: white !important;
            color: black !important;
            padding: 1rem;
            border-radius: 0.75rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            font-family: 'Battambang', sans-serif;
            width: 100%;
        }
        
        .report-table { 
            width: 100%; 
            min-width: 650px; /* Force table to keep its shape on mobile */
            border-collapse: collapse; 
            font-size: 12px; 
            margin-top: 10px; 
            line-height: 1.3; 
            color: black !important;
        }
        .report-table th, .report-table td { 
            border: 1px solid #000; 
            padding: 4px 5px; 
            text-align: center; 
            vertical-align: middle; 
        }
        .report-table th { 
            background-color: #addcf3 !important; 
            font-family: 'Moul', cursive; 
            font-size: 11px; 
            font-weight: normal; 
            color: black !important;
        }
        .bg-summary { background-color: #ffffff !important; }
        
        .table-scroll-wrapper {
            width: 100%;
            overflow-x: auto; /* អនុញ្ញាតឱ្យអូសឆ្វេងស្តាំបាន */
            -webkit-overflow-scrolling: touch;
            border-radius: 0.75rem;
            background-color: white;
            padding: 0.5rem;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }
        
        .zoom-hint {
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body class="bg-app-dark min-h-screen flex flex-col">

                avg = score / 10;
            }
            if (avg >= 9.0) return 'A';
            if (avg >= 8.0) return 'B';
            if (avg >= 7.0) return 'C';
            if (avg >= 6.0) return 'D';
            if (avg >= 5.0) return 'E';

        window.getAttendanceStats = function(studentId, period, type) {
            let absent = 0; let permission = 0; 
            const monthStrs = {
                'jan': '01', 'feb': '02', 'mar': '03', 'apr': '04',
                'may': '05', 'jun': '06', 'jul': '07', 'aug': '08',
                'sep': '09', 'oct': '10', 'nov': '11', 'dec': '12'
            };
            const sem1AttMonths = ['11', '12', '01', '02', '03', '04', '05'];
            const sem2AttMonths = ['06', '07', '08', '09'];

            Object.keys(attendanceHistory).forEach(dateStr => {
                const parts = dateStr.split('-');
                if (parts.length !== 3) return;
                const m = parts[1];
                let isMatch = false;
                if (type === 'yearly') {
                    isMatch = true;
                } else if (type === 'semester') {
                    isMatch = period === 'sem1' ? sem1AttMonths.includes(m) : sem2AttMonths.includes(m);
                } else {
                    isMatch = m === monthStrs[period];
                }
                
                if (isMatch) {
                    const record = attendanceHistory[dateStr][studentId];
                    if (record) {
                        if (record.status === 'A') absent++;       
                        if (record.status === 'L') permission++;   
                    }
                }
            });
            return { absent, permission };
        };

        async function getCachedScoresData(year, period) {
            const key = `${year}_${period}`;
            if (scoresCache[key]) return scoresCache[key];
            
            let data = {};
            try {
                // ដោយសារយើងប្រើ db ដែលភ្ជាប់ជាមួយ LocalCache វានឹងទាញយកទិន្នន័យពី Cache មុនគេបើមាន
                const ref = doc(db, 'artifacts', PTEC_APP_ID, 'users', tid, 'scores', key);
                const snap = await getDoc(ref);
                if (snap.exists()) {
                    data = snap.data();
                } else {
                    const oldRef = doc(db, "scores", key);
                    const oldSnap = await getDoc(oldRef).catch(() => null);
                    if (oldSnap && oldSnap.exists()) data = oldSnap.data();
                }
            } catch (e) { console.error("Firebase fetch error", e); }
            
            scoresCache[key] = data;
            return data;
        }

        window.getSubjectRank = function(studentId, year, period, subjectKey) {
            const sData = scoresCache[`${year}_${period}`] || {};
            const scoresList = [];
            for (let sidInDb in sData) {
                if(sidInDb === 'metadata') continue;
                let dbRecord = sData[sidInDb] || {};
                let studentScores = dbRecord.hasOwnProperty('scores') ? dbRecord.scores : dbRecord;
                let val = studentScores[subjectKey];
                if (val !== null && val !== undefined && val !== '') {
                    let num = parseFloat(val);
                    if (!isNaN(num)) scoresList.push({ id: sidInDb, score: num });
                }
            }
            if (scoresList.length === 0) return '-';

            scoresList.sort((a, b) => b.score - a.score);
            let currentRank = 1;
            for (let i = 0; i < scoresList.length; i++) {
                if (i > 0 && scoresList[i].score < scoresList[i-1].score) currentRank = i + 1;
                if (String(scoresList[i].id) === String(studentId)) return currentRank;
            }
            return '-';
        };

        function computeMonthlyAvg(studentId, year, monthsArray) {
            let sumOfAverages = 0;
            let validMonthsCount = 0;
            monthsArray.forEach(month => {
                const scoresData = scoresCache[`${year}_${month}`] || {};
                const dbRecord = scoresData[studentId];
                if (dbRecord) {
                    if (dbRecord.results && dbRecord.results.average !== undefined) {
                        sumOfAverages += parseFloat(dbRecord.results.average) || 0;
                        validMonthsCount++;
                    } else {
                        const studentScores = dbRecord.hasOwnProperty('scores') ? dbRecord.scores : dbRecord;
                        let mSum = 0, mCount = 0;
                        activeMonthlySubjects.forEach(col => {
                            if (col.isText) return;
                            const val = studentScores[col.key];
                            if (val !== null && val !== undefined && val !== "") {
                                const numVal = parseFloat(val);
                                if (!isNaN(numVal)) { mSum += numVal; mCount++; }
                            }
                        });
                        if (mCount > 0) {
                            sumOfAverages += (mSum / mCount);
                            validMonthsCount++;
                        }
                    }
                }
            });
            return validMonthsCount > 0 ? (sumOfAverages / validMonthsCount) : 0;
        }

        function computeExamAvg(studentId, year, semKey) {
            const scoresData = scoresCache[`${year}_${semKey}`] || {};
            const dbRecord = scoresData[studentId] || {};
            
            // Prefer explicitly saved results
            if (dbRecord.results && dbRecord.results.examAverage !== undefined) {
                return {
                    total: parseFloat(dbRecord.results.examTotal) || 0,
                    avg: parseFloat(dbRecord.results.examAverage) || 0,
                    count: 1
                };
            }

            const studentScores = dbRecord.hasOwnProperty('scores') ? dbRecord.scores : dbRecord;
            let sum = 0, count = 0;
            activeSemesterSubjects.forEach(col => {
                if (col.isText) return;
                const val = studentScores[col.key];
                if (val !== null && val !== undefined && val !== "") {
                    const numVal = parseFloat(val);
                    if (!isNaN(numVal)) { sum += numVal; count++; }
                }
            });
            return { total: sum, count: count, avg: count > 0 ? (sum / count) : 0 };
        }

        function computeSemAvg(studentId, year, semKey) {
            const customMonths = customMonthsConfig[`${year}_${semKey}`];
            const months = customMonths || (semKey === 'sem1' ? sem1Months : sem2Months);
            
            const exam = computeExamAvg(studentId, year, semKey);
            const monthlyAvg = computeMonthlyAvg(studentId, year, months);
            
            let semAvg = (exam.avg + monthlyAvg) / 2;
            if (exam.count === 0 && monthlyAvg === 0) semAvg = 0;
            
            return semAvg;
        }

        function getRank(studentId, averagesArray) {
            const sorted = [...averagesArray].sort((a, b) => b.avg - a.avg);
            let currentRank = 1;
            for (let i = 0; i < sorted.length; i++) {
                if (i > 0 && sorted[i].avg < sorted[i-1].avg) currentRank = i + 1;
                if (String(sorted[i].id) === String(studentId)) return currentRank;
            }
            return '-';
        }

        window.fetchScores = async () => {
            setUIState('loading');
            
            const year = document.getElementById('yearSelect').value;
            const type = document.getElementById('typeSelect').value;
            const period = document.getElementById('periodSelect').value;
            const lang = window.currentLang;
            
            try {
                // Pre-fetch all necessary data based on type
                if (type === 'yearly') {
                    const allMonthsToFetch = ['nov', 'dec', 'jan', 'feb', 'mar', 'apr', 'may', 'jun', 'jul', 'aug'];
                    await Promise.all([
                        getCachedScoresData(year, 'sem1'),
                        getCachedScoresData(year, 'sem2'),
                        ...allMonthsToFetch.map(m => getCachedScoresData(year, m))
                    ]);
                } else if (type === 'semester') {
                    const customMonths = customMonthsConfig[`${year}_${period}`];
                    const months = customMonths || (period === 'sem1' ? sem1Months : sem2Months);
                    await Promise.all([
                        getCachedScoresData(year, period),
                        ...months.map(m => getCachedScoresData(year, m))
                    ]);
                } else {
                    await getCachedScoresData(year, period);
                }

                const student = studentProfile;
                if (!student.id) {
                    setUIState('empty');
                    return;
                }

                let displayRows = [];
                let totalScore = 0;
                let studentAvg = 0;
                let studentGrade = 'F';
                let rank = '-';

                let sem1Avg = 0, sem2Avg = 0, sem1FinalRank = '-', sem2FinalRank = '-';
                let sem1FinalGrade = '-', sem2FinalGrade = '-';
                let sem1ExamAvg = 0, sem1ExamRank = '-', sem1ExamGrade = '-';
                let sem2ExamAvg = 0, sem2ExamRank = '-', sem2ExamGrade = '-';
                let yearlyRank = '-';
                let examTotalVal = 0, examAvgVal = 0, monthlyAvgVal = 0, semAvgVal = 0;

                // --- DATA EXTRACTION ---
                if (type === 'yearly') {
                    sem1ExamAvg = computeExamAvg(student.id, year, 'sem1').avg;
                    sem1Avg = computeSemAvg(student.id, year, 'sem1');
                    sem1FinalRank = getRank(student.id, allStudents.map(s => ({id: s.id, avg: computeSemAvg(s.id, year, 'sem1')})));
                    sem1FinalGrade = window.calculateGrade(sem1Avg, true, 'semester');
                    
                    sem1ExamRank = getRank(student.id, allStudents.map(s => ({id: s.id, avg: computeExamAvg(s.id, year, 'sem1').avg})));
                    sem1ExamGrade = window.calculateGrade(sem1ExamAvg, true, 'semester');

                    sem2ExamAvg = computeExamAvg(student.id, year, 'sem2').avg;
                    sem2Avg = computeSemAvg(student.id, year, 'sem2');
                    sem2FinalRank = getRank(student.id, allStudents.map(s => ({id: s.id, avg: computeSemAvg(s.id, year, 'sem2')})));
                    sem2FinalGrade = window.calculateGrade(sem2Avg, true, 'semester');
                    
                    sem2ExamRank = getRank(student.id, allStudents.map(s => ({id: s.id, avg: computeExamAvg(s.id, year, 'sem2').avg})));
                    sem2ExamGrade = window.calculateGrade(sem2ExamAvg, true, 'semester');

                    studentAvg = (sem1Avg + sem2Avg) / 2;
                    if (sem1Avg === 0 && sem2Avg === 0) studentAvg = 0;
                    
                    yearlyRank = getRank(student.id, allStudents.map(s => {
                        let a1 = computeSemAvg(s.id, year, 'sem1');
                        let a2 = computeSemAvg(s.id, year, 'sem2');
                        return { id: String(s.id), avg: (a1 > 0 || a2 > 0) ? (a1 + a2)/2 : 0 };
                    }));
                    studentGrade = window.calculateGrade(studentAvg, true, 'yearly');
                    
                } else if (type === 'semester') {
                    const sData = scoresCache[`${year}_${period}`] || {};
                    const dbRecord = sData[student.id] || {};
                    const studentScores = dbRecord.hasOwnProperty('scores') ? dbRecord.scores : dbRecord;

                    activeSemesterSubjects.forEach(col => {
                        let val = studentScores[col.key];
                        if (val !== null && val !== undefined && val !== '') {
                            let dispLabel = lang === 'en' && col.label_en ? col.label_en : col.label;
                            if (col.isText) {
                                displayRows.push({ label: dispLabel, isText: true, textValue: val, key: col.key, color: col.color });
                            } else {
                                let numVal = parseFloat(val);
                                if (!isNaN(numVal)) { 
                                    displayRows.push({ label: dispLabel, score: numVal, max: col.max, key: col.key, color: col.color });
                                }
                            }
                        }
                    });

                    const examStats = computeExamAvg(student.id, year, period);
                    const customMonths = customMonthsConfig[`${year}_${period}`];
                    const monthsForSem = customMonths || (period === 'sem1' ? sem1Months : sem2Months);
                    
                    examTotalVal = examStats.total;
                    examAvgVal = examStats.avg;
                    monthlyAvgVal = computeMonthlyAvg(student.id, year, monthsForSem);

                } else { // Monthly
                    const noDataTxt = lang === 'en' ? 'No score data available' : 'មិនមានទិន្នន័យពិន្ទុទេ';

                    displayRows.forEach((item, index) => {
                        if (item.isText) {
                            tbodyHtml += `
                                <tr>
                                    <td class="kh-moul border border-black text-green-600">${window.toKhmerNum(index + 1)}</td>
                                    <td colspan="2" class="text-left font-bold px-2 border border-black text-blue-800">${item.label}</td>
                                    <td colspan="3" class="text-center font-bold text-blue-600 border border-black">${item.textValue}</td>
                                    <td class="border border-black"></td>
                                </tr>
                            `;
                        } else {
                            let grade = window.calculateGrade(item.score, true, 'monthly');
                            let gradeClass = getGradeColorClass(grade);
                            
                            tbodyHtml += `
                                <tr>
                                    <td class="kh-moul border border-black text-green-600">${window.toKhmerNum(index + 1)}</td>
                                    <td colspan="2" class="text-left font-bold px-2 border border-black text-blue-800">${item.label}</td>
                                    <td class="border border-black">${item.max}</td>
                                    <td class="border border-black">${window.formatNum(item.score)}</td>
                                    <td class="${gradeClass} border border-black">${grade}</td>
                                    <td class="border border-black"></td>
                                </tr>
                            `;
                        }
                    });

                    if (displayRows.length === 0) {
                        tbodyHtml += `<tr><td colspan="7" class="text-center italic text-gray-500 border border-black py-4">${noDataTxt}</td></tr>`;
                    }

                    const att = window.getAttendanceStats(student.id, period, type);
                    const totalAbs = att.permission + att.absent;

                    tbodyHtml += `
                        <tr class="font-bold bg-summary text-[11px] whitespace-nowrap">
                            <td class="border border-black px-0.5">${th.absent}</td>
                            <td class="border border-black px-0.5">${th.permission}</td>
                            <td class="border border-black px-0.5">${th.noPermission}</td>
                            <td class="border border-black px-0.5 text-[#0054a6]">${th.total}</td>
                            <td class="border border-black px-0.5 text-[#0054a6]">${th.avg}</td>
                            <td class="border border-black px-0.5 text-red-600 text-[10px]">${th.rank}</td>
                            <td class="border border-black px-0.5">${th.grade}</td>
                        </tr>
                        <tr class="text-[12px] font-bold text-black">
                            <td class="border border-black">${totalAbs > 0 ? totalAbs : '0'}</td>
                            <td class="border border-black">${att.permission > 0 ? att.permission : '0'}</td>
                            <td class="border border-black">${att.absent > 0 ? att.absent : '0'}</td>
                            <td class="border border-black text-[#0054a6] font-bold">${window.formatNum(totalScore)}</td>
                            <td class="border border-black text-[#0054a6] font-bold">${window.formatNum(studentAvg)}</td>
                            <td class="border border-black text-red-600 font-bold">${rank}</td>
                            <td class="border border-black ${getGradeColorClass(studentGrade)}">${studentGrade}</td>
                        </tr>
                    `;
                }

                // --- GENERATE FULL HTML ---
                const today = new Date();
                let lunarDateStr = "";
                if (typeof momentkh !== 'undefined') {
                    try {
                        const m = momentkh.fromDate(today);
                        lunarDateStr = momentkh.format(m).replace('ពុទ្ធសករាជ', 'ព.ស.');
                    } catch(e) {}
                }
                
                let solarDateStr = lang === 'en' 
                    ? `${englishMonths[today.getMonth()]} ${today.getDate()}, ${today.getFullYear()}`
                    : `ថ្ងៃទី${window.toKhmerNum(today.getDate())} ខែ${khmerMonths[today.getMonth()]} ឆ្នាំ${window.toKhmerNum(today.getFullYear())}`;

                const lbls = {
                    id: lang === 'en' ? 'ID' : 'អត្តលេខ',
                    name: lang === 'en' ? 'Name' : 'ឈ្មោះសិស្ស',
                    grade: lang === 'en' ? 'Class' : 'ថ្នាក់ទី',
                    gender: lang === 'en' ? 'Gender' : 'ភេទ',
                    genderVal: (student.gender === 'ប្រុស' || student.gender === 'M' || student.gender === 'm') ? (lang === 'en' ? 'M' : 'ប') : (lang === 'en' ? 'F' : 'ស'),
                    seenApproved: lang === 'en' ? 'Seen and Approved' : 'បានឃើញ និងឯកភាព',
                    teacherComment: lang === 'en' ? "Teacher's Comment" : 'មូលវិចាររបស់គ្រូប្រចាំថ្នាក់',
                    wish: lang === 'en' ? "Wishing students and parents good health and luck." : 'សូមជូនពរមាតាបិតា ព្រមទាំងកូនៗមានសុខភាពល្អ និងសំណាងល្អ',
                    teacherSign: lang === 'en' ? 'Homeroom Teacher' : 'គ្រូប្រចាំថ្នាក់',
                    location: lang === 'en' ? (classConfig.location_en || 'Phnom Penh') : classConfig.location
                };

                let html = `
                <div class="print-container">
                    <h1 class="${lang === 'en' ? '' : 'kh-moul '}text-center text-[15px] mb-4 mt-1 font-bold">${titleHtml}</h1>

                    <div class="flex justify-between text-[11px] font-bold mb-2 px-2">
                        <div class="text-left space-y-1">
                            <div class="flex items-baseline gap-2">
                                <span class="w-[70px] ${lang === 'en' ? '' : 'kh-moul '}inline-block text-black">${lbls.id}</span>
                                <span class="font-bold text-[11px] text-black">${student.id}</span>
                            </div>
                            <div class="flex items-baseline gap-2">
                                <span class="w-[70px] ${lang === 'en' ? '' : 'kh-moul '}inline-block text-black">${lbls.name}</span>
                                <span class="${lang === 'en' ? '' : 'kh-moul '}font-normal text-[11px] text-black">${student.name || (lang === 'en' ? 'Unknown' : 'មិនស្គាល់ឈ្មោះ')}</span>
                            </div>
                        </div>
                        
                        <div class="text-right flex flex-col items-end space-y-1">
                            <div class="flex items-baseline justify-between min-w-[100px] gap-2">
                                <span class="whitespace-nowrap ${lang === 'en' ? '' : 'kh-moul '}text-black">${lbls.grade}</span>
                                <span class="${lang === 'en' ? '' : 'kh-moul '}font-normal whitespace-nowrap text-black ml-2">${classConfig.className}</span>
                            </div>
                            <div class="flex items-baseline justify-between min-w-[100px] gap-2">
                                <span class="whitespace-nowrap ${lang === 'en' ? '' : 'kh-moul '}text-black">${lbls.gender}</span>
                                <span class="${lang === 'en' ? '' : 'kh-moul '}font-normal text-black ml-2">${lbls.genderVal}</span>
                            </div>
                        </div>
                    </div>

                    <table class="report-table">
                        <thead>${theadHtml}</thead>
                        <tbody>${tbodyHtml}</tbody>
                    </table>

                    <div class="flex justify-between mt-4 text-[10px] px-2 text-center text-black">
                        <div class="w-[45%] flex flex-col items-center">
                            <p class="mb-0 text-[#00a651] font-bold">${lbls.seenApproved}</p>
                            <p class="${lang === 'en' ? 'font-bold' : 'kh-moul'} mb-0 text-[#00a651] mt-1">${classConfig.managerRole}</p>
                            <div class="h-12 w-full mt-1 border-b border-dotted border-gray-400"></div>
                        </div>
                        <div class="w-[55%] flex flex-col items-center">
                            <div class="mb-2 text-center w-full">
                                <p class="font-bold text-[#00a651] ${lang === 'en' ? '' : 'kh-moul '}mb-0" style="font-size: 10px;">${lbls.teacherComment}</p>
                                <p class="text-red-600 mb-0 font-bold mt-1" style="font-size: 9px;">${commentText}</p>
                                <p class="text-red-600 mb-0 mt-1" style="font-size: 9px;">${lbls.wish}</p>
                            </div>
                            <p class="mb-0 font-battambang text-[10px] text-blue-700 mt-1">${lang === 'en' ? '' : lunarDateStr}</p>
                            <p class="mb-0 font-battambang text-[10px] text-blue-700"><span>${lbls.location}</span>, <span>${solarDateStr}</span></p>
                            <p class="font-bold text-[#00a651] mb-0 mt-1 ${lang === 'en' ? '' : 'kh-moul'}">${lbls.teacherSign}</p>
                            <div class="h-12 w-full mt-1 border-b border-dotted border-gray-400"></div>
                        </div>
                    </div>

                    <div class="mt-4 text-[11px] px-2 text-black">
                        <p class="font-bold text-gray-800 text-sm mb-2 text-left">${i18n.commentLbl[lang]}</p>
                        <textarea id="parentCommentInput" class="w-full border border-gray-300 rounded-xl p-3 text-[13px] focus:outline-none focus:border-emerald-500 bg-gray-50 text-black shadow-sm" rows="2" placeholder="${i18n.commentPlaceholder[lang]}">${parentComment}</textarea>
                        <div class="mt-3 flex justify-end">
                            <button id="saveCommentBtn" onclick="window.saveParentComment()" class="bg-[#00a651] hover:bg-green-700 text-white px-4 py-2 rounded-lg font-bold flex items-center gap-2 transition shadow-sm text-xs">
                                <i data-lucide="save" class="w-4 h-4"></i> <span id="ui-btn-save-lbl">${i18n.btnSave[lang]}</span>
                            </button>
                        </div>
                    </div>
                </div>
                `;

                document.getElementById('report-card-container').innerHTML = html;
                setUIState('results');

            } catch (error) {
                console.error("Fetch Error:", error);
                
                // បង្ហាញសារ Error ទៅកាន់អ្នកប្រើប្រាស់
                const lang = window.currentLang || 'km';
                document.getElementById('ui-empty-title').textContent = lang === 'en' ? 'Data Fetch Error' : 'មានបញ្ហាក្នុងការទាញទិន្នន័យ';
                document.getElementById('ui-empty-desc').textContent = lang === 'en' ? 'Please check your internet connection or start a Local Server.' : 'សូមពិនិត្យអ៊ីនធឺណិត ឬត្រូវប្រាកដថាអ្នកបើកវាតាមរយៈ Local Server។';
                
                setUIState('empty');
            }
        };

        window.saveParentComment = async function() {
            const comment = document.getElementById('parentCommentInput').value;
            const { year, period, studentId } = window.currentViewContext;
            const lang = window.currentLang;
            
            if (!year || !period || !studentId) return;

            const btn = document.getElementById('saveCommentBtn');
            const originalHtml = btn.innerHTML;
            btn.innerHTML = `<div class="spinner border-2 border-white border-t-transparent w-4 h-4 rounded-full"></div> ${i18n.btnSaving[lang]}`;
            btn.disabled = true;

            try {
                const docRef = doc(db, 'artifacts', PTEC_APP_ID, 'users', tid, 'scores', `${year}_${period}`);
                
                await setDoc(docRef, {
                    [studentId]: {
                        parent_comment: comment
                    }
                }, { merge: true });

                // Update cache
                if(scoresCache[`${year}_${period}`] && scoresCache[`${year}_${period}`][studentId]) {
                    scoresCache[`${year}_${period}`][studentId].parent_comment = comment;
                } else if (!scoresCache[`${year}_${period}`]) {
                    scoresCache[`${year}_${period}`] = {};
                    scoresCache[`${year}_${period}`][studentId] = { parent_comment: comment };
                }

                btn.innerHTML = `<i data-lucide="check" class="w-4 h-4"></i> ${i18n.btnSaved[lang]}`;
                btn.classList.replace('bg-[#00a651]', 'bg-blue-600');
                
                setTimeout(() => {
                    btn.innerHTML = originalHtml;
                    btn.classList.replace('bg-blue-600', 'bg-[#00a651]');
                    btn.disabled = false;
                    if (typeof lucide !== 'undefined') lucide.createIcons();
                }, 2000);

            } catch (e) {
                console.error("Error saving parent comment", e);
                btn.innerHTML = `<i data-lucide="alert-circle" class="w-4 h-4"></i> ${i18n.btnFailed[lang]}`;
                btn.classList.replace('bg-[#00a651]', 'bg-red-600');
                setTimeout(() => {
                    btn.innerHTML = originalHtml;
                    btn.classList.replace('bg-red-600', 'bg-[#00a651]');
                    btn.disabled = false;
                    if (typeof lucide !== 'undefined') lucide.createIcons();
                }, 2000);
            }
        };

        // Initialize Application
        document.addEventListener('DOMContentLoaded', () => {
            initTheme();
            if (typeof lucide !== 'undefined') lucide.createIcons();

            if (!tid || !sid) {
                // ដក Alert ចេញ ហើយប្រើការ Redirect ផ្ទាល់ដើម្បីជៀសវាងផ្អាកការដំណើរការរបស់ Browser
                console.warn("មិនមានទិន្នន័យសម្គាល់គណនី សូមចូលប្រព័ន្ធឡើងវិញ។");
                window.location.replace('index.html');
                return;
            }

            const initAuth = async () => {
                try {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else if (!auth.currentUser) {
                        await signInAnonymously(auth);
                    }
                } catch (error) {
                    console.error("Auth error:", error);
                }
            };

            initAuth().then(() => {
                onAuthStateChanged(auth, async (user) => {
                    if (user) {
                        await loadStudentProfile();
                        await loadTeacherConfig();
                        window.updatePeriodOptions(); // This triggers fetchScores
                    }
                });
            });
        });

    </script>
</body>
</html>
